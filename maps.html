<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps — Geography Project</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1b2a4a;
    --navy-dark: #111e35;
    --red: #c0392b;
    --cream: #faf5ee;
    --cream-dark: #f0e9dc;
    --gold: #c9a84c;
    --ink: #2c2c2c;
    --muted: #6a6258;
    --rule: #ddd5c4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream-dark); font-family:'Raleway',sans-serif; color:var(--ink); }

  nav {
    background: var(--navy-dark);
    padding: 12px 30px;
    border-bottom: 2px solid var(--gold);
  }
  nav a { color:var(--gold); text-decoration:none; font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; }
  nav a:hover { color:#fff; }

  .page-title {
    background: var(--navy);
    color: var(--cream);
    padding: 36px 40px;
    border-bottom: 4px solid var(--red);
    position: relative; overflow: hidden;
  }
  .page-title::before {
    content: '地図'; font-family:'Noto Serif JP',serif; font-size:120px; font-weight:700;
    position:absolute; right:20px; top:-10px; opacity:0.07; color:var(--gold);
  }
  .page-title small { font-size:0.72rem; opacity:0.75; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
  .page-title h1 { font-family:'Playfair Display',serif; font-size:2rem; margin-top:6px; }

  .container { max-width:980px; margin:30px auto; padding:0 20px 60px; }

  .note { background:var(--cream); border-left:4px solid var(--gold); padding:12px 16px; border-radius:0 4px 4px 0; font-size:0.84rem; color:var(--muted); margin-bottom:24px; }

  .maps-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }

  .map-slot { background:var(--cream); border-radius:6px; box-shadow:0 4px 20px rgba(27,42,74,0.1); overflow:hidden; border-top:3px solid var(--navy); }

  .map-slot-header { background:var(--navy); color:var(--gold); padding:14px 20px; display:flex; align-items:center; gap:10px; }
  .map-slot-header input { background:transparent; border:none; color:var(--gold); font-family:'Playfair Display',serif; font-size:1rem; flex:1; }
  .map-slot-header input:focus { outline:none; border-bottom:1px solid rgba(201,168,76,0.5); }
  .map-slot-header input::placeholder { color:rgba(201,168,76,0.4); }

  .map-area { position:relative; min-height:260px; display:flex; align-items:center; justify-content:center; background:var(--cream-dark); border:3px dashed var(--rule); margin:16px; border-radius:4px; cursor:pointer; transition:background 0.2s; }
  .map-area:hover { background:#e8e0d0; }
  .map-area img { width:100%; height:100%; object-fit:contain; display:block; border-radius:3px; }
  .map-area .placeholder-text { text-align:center; color:#bbb; }
  .map-area .placeholder-text .icon { font-size:2.5rem; display:block; margin-bottom:8px; }
  .map-area .placeholder-text p { font-size:0.84rem; line-height:1.5; }
  .map-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

  .map-caption { padding:0 16px 16px; }
  .map-caption textarea { width:100%; border:1.5px dashed var(--rule); border-radius:3px; padding:9px 12px; font-size:0.84rem; font-family:'Raleway',sans-serif; resize:vertical; min-height:60px; background:#fafaf6; color:var(--muted); font-style:italic; }
  .map-caption textarea:focus { outline:none; border-color:var(--gold); background:white; color:var(--ink); font-style:normal; }

  .clear-btn { background:none; border:none; cursor:pointer; color:var(--gold); font-size:0.78rem; margin-left:auto; display:block; padding:4px 0; }

  @media(max-width:640px) { .maps-grid { grid-template-columns:1fr; } }
  @media print { nav,.note { display:none; } body{background:white;} .map-slot{box-shadow:none;border:1px solid #ddd;} }

  .edit-only { display: none; }
  body[data-edit-mode="off"] .map-area input[type=file] { display: none; }
  body[data-edit-mode="off"] .clear-btn { display: none !important; }
  body[data-edit-mode="off"] .map-slot-header input { pointer-events: none; }
  body[data-edit-mode="off"] .map-caption textarea { pointer-events: none; color: var(--ink); font-style: normal; background: #fafaf6; }
</style>
<script src="auth.js" defer></script>
</head>
<body>
<nav><a href="index.html">← Back to Project Hub</a></nav>
<div class="page-title">
  <small>Genre 6</small>
  <h1>🗺️ Maps of Japan</h1>
</div>

<div class="container">
  <div class="edit-only">
    <div class="note">💡 <strong>How to insert maps:</strong> Click any dashed box to upload an image from your computer. Edit the map title and caption below each one. Print the page when done.</div>
  </div>

  <div class="maps-grid" id="maps-grid"></div>
</div>

<script>
const mapDefs = [
  {
    title: 'Physical / Topographic Map',
    imageUrl: 'https://www.freeworldmaps.net/asia/japan/honshu.jpg',
    caption: 'Overall a very low terrain with the exception of the volcanic mountain range, Known for being home to mt. fuji.'
  },
  {
    title: 'Political / Regional Map',
    imageUrl: 'https://previews.123rf.com/images/zlatovlaska1/zlatovlaska11803/zlatovlaska1180300012/97192145-political-map-of-japan-with-regions-and-their-capitals.jpg',
    caption: 'Regions include: Hokkaido, Tohoku, Kanto, Chubu, Kansai, Shikoku, Chugoku, Kyushu.'
  },
  {
    title: 'Climate / Biome Map',
    imageUrl: 'https://www.climatestotravel.com/images/japan/climates-japan-2.png',
    caption: 'Label climate zones or biomes visible on this map.'
  },
  {
    title: 'Population / Human Activity Map',
    imageUrl: 'https://brilliantmaps.com/wp-content/uploads/1990_Japan_Census_population_prefectures.svg_.png',
    caption: 'Coastal cities are very heavily populated.'
  },
];

let images = JSON.parse(localStorage.getItem('geo-maps-images') || '{}');
let captions = JSON.parse(localStorage.getItem('geo-maps-captions') || '{}');
let titles = JSON.parse(localStorage.getItem('geo-maps-titles') || '{}');

function render() {
  const grid = document.getElementById('maps-grid');
  grid.innerHTML = '';
  mapDefs.forEach((m, i) => {
    const imgSrc = m.imageUrl || '';
    const cap = captions[i] !== undefined ? captions[i] : m.caption;
    const title = titles[i] !== undefined ? titles[i] : m.title;
    grid.innerHTML += `
    <div class="map-slot">
      <div class="map-slot-header">
        <span>🗺️</span>
        <input type="text" value="${title}" placeholder="Map Title" onchange="titles[${i}] = this.value; save()">
      </div>
      <div class="map-area">
        ${imgSrc && imgSrc !== 'PASTE_IMAGE_URL_HERE'
          ? `<img src="${imgSrc}" alt="Map ${i+1}">`
          : `<div class="placeholder-text"><span class="icon">🌐</span><p>Paste an image URL inside the code<br><span style="color:#ccc;font-size:0.78rem">imageUrl: 'YOUR_LINK_HERE'</span></p></div>`
        }
      </div>
      <div class="map-caption">
        <textarea placeholder="Write your map caption and analysis here..." onchange="captions[${i}] = this.value; save()">${cap}</textarea>
      </div>
    </div>`;
  });
}

function save() {
  try {
    localStorage.setItem('geo-maps-images', JSON.stringify(images));
    localStorage.setItem('geo-maps-captions', JSON.stringify(captions));
    localStorage.setItem('geo-maps-titles', JSON.stringify(titles));
  } catch(e) { console.warn('Storage full'); }
}

render();
</script>
</body>
</html>

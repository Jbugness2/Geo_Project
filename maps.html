<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps — Geography Project</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --earth:#2d4a3e;--sand:#e8d5b0;--clay:#c4703a;--mist:#f0ece3;--ink:#1a1a1a;--accent:#7eb89a; }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:var(--mist); font-family:'DM Sans',sans-serif; color:var(--ink); }
  nav { background:var(--earth); padding:14px 30px; }
  nav a { color:var(--sand); text-decoration:none; font-size:0.85rem; letter-spacing:0.08em; }
  .page-title { background:var(--clay); color:white; padding:30px 40px; }
  .page-title small { font-size:0.8rem; opacity:0.8; letter-spacing:0.1em; text-transform:uppercase; }
  .page-title h1 { font-family:'Playfair Display',serif; font-size:2rem; margin-top:6px; }
  .container { max-width:960px; margin:30px auto; padding:0 20px 60px; }
  .note { background:#fff8e1; border-left:4px solid #f5c842; padding:12px 16px; border-radius:3px; font-size:0.85rem; color:#555; margin-bottom:24px; }
  .maps-grid { display:grid; grid-template-columns:1fr 1fr; gap:22px; }
  .map-slot { background:white; border-radius:6px; box-shadow:0 2px 12px rgba(0,0,0,0.07); overflow:hidden; }
  .map-slot-header { background:var(--earth); color:var(--sand); padding:14px 20px; display:flex; align-items:center; gap:10px; }
  .map-slot-header input { background:transparent; border:none; color:var(--sand); font-family:'Playfair Display',serif; font-size:1rem; flex:1; }
  .map-slot-header input:focus { outline:none; border-bottom:1px solid var(--accent); }
  .map-slot-header input::placeholder { color:rgba(255,255,255,0.4); }
  .map-area { position:relative; min-height:260px; display:flex; align-items:center; justify-content:center; background:#f0ece3; border:3px dashed #c5bfb2; margin:16px; border-radius:4px; cursor:pointer; transition:background 0.2s; }
  .map-area:hover { background:#e8e3d8; }
  .map-area img { width:100%; height:100%; object-fit:contain; display:block; border-radius:3px; }
  .map-area .placeholder-text { text-align:center; color:#bbb; }
  .map-area .placeholder-text .icon { font-size:2.5rem; display:block; margin-bottom:8px; }
  .map-area .placeholder-text p { font-size:0.85rem; line-height:1.5; }
  .map-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .map-caption { padding:0 16px 16px; }
  .map-caption textarea { width:100%; border:1.5px dashed #ccc; border-radius:3px; padding:9px 12px; font-size:0.84rem; font-family:'DM Sans',sans-serif; resize:vertical; min-height:60px; background:#fafafa; color:#aaa; font-style:italic; }
  .map-caption textarea:focus { outline:none; border-color:var(--accent); background:white; color:var(--ink); font-style:normal; }
  .clear-btn { background:none; border:none; cursor:pointer; color:var(--accent); font-size:0.78rem; margin-left:auto; display:block; padding:4px 0; }
  @media(max-width:640px) { .maps-grid { grid-template-columns:1fr; } }
  @media print { nav,.note { display:none; } body{background:white;} .map-slot{box-shadow:none;border:1px solid #ddd;} }
</style>
<style>
  .edit-only { display: none; }
  body[data-edit-mode="off"] .map-area input[type=file] { display: none; }
  body[data-edit-mode="off"] .clear-btn { display: none !important; }
  body[data-edit-mode="off"] .map-slot-header input { pointer-events: none; }
  body[data-edit-mode="off"] .map-caption textarea { pointer-events: none; color: var(--ink); font-style: normal; background: #fafafa; }
</style>
<script src="auth.js" defer></script>
</head>
<body>
<nav><a href="index.html">← Back to Project Hub</a></nav>
<div class="page-title">
  <small>Genre 6</small>
  <h1>🗺️ Maps</h1>
</div>

<div class="container">
  <div class="edit-only">
  <div class="note">💡 <strong>How to insert maps:</strong> Click any dashed box to upload an image from your computer. Edit the map title and caption below each one. Print the page when done. Maps can include physical, political, climate, population, or resource maps.</div>
  </div>

  <div class="maps-grid" id="maps-grid">
    <!-- filled by JS -->
  </div>
</div>

<script>
const mapDefs = [
  {
    title: 'Physical / Topographic Map',
    imageUrl: 'https://www.google.com/imgres?q=physical%20map%20of%20japan&imgurl=https%3A%2F%2Fwww.freeworldmaps.net%2Fasia%2Fjapan%2Fhonshu.jpg&imgrefurl=https%3A%2F%2Fwww.freeworldmaps.net%2Fasia%2Fjapan%2Fhonshu.html&docid=V833Tqghk3ya3M&tbnid=9KDc9Sxvz73KhM&vet=12ahUKEwiauKeRzcaUAxVvJe8CHWrWAZQQnPAOegQIHhAB..i&w=750&h=674&hcb=2&ved=2ahUKEwiauKeRzcaUAxVvJe8CHWrWAZQQnPAOegQIHhAB',
    caption: 'Overall a very low terrain with the exception of the volcanic mountain range, Known for being home to mt. fuji.'
  },
  {
    title: 'Political / Regional Map',
    imageUrl: 'https://www.google.com/imgres?q=political%20map%20of%20japan&imgurl=https%3A%2F%2Fpreviews.123rf.com%2Fimages%2Fzlatovlaska1%2Fzlatovlaska11803%2Fzlatovlaska1180300012%2F97192145-political-map-of-japan-with-regions-and-their-capitals.jpg&imgrefurl=https%3A%2F%2Fwww.123rf.com%2Fphoto_97192145_political-map-of-japan-with-regions-and-their-capitals.html&docid=H1zPZxVMUVaVIM&tbnid=bv6XQP7Ju3C9BM&vet=12ahUKEwi8saapzcaUAxUPEUQIHeRMD6QQnPAOegQILBAB..i&w=1300&h=1300&hcb=2&ved=2ahUKEwi8saapzcaUAxUPEUQIHeRMD6QQnPAOegQILBAB',
    caption: 'REgions include: Hokkaido, Tohoku, Kanto, Chubu, Kansai, Shikoku, Chugoku, Kyushu.'
  },
  {
    title: 'Climate / Biome Map',
    imageUrl: 'https://www.google.com/imgres?q=climate%20map%20of%20japan&imgurl=https%3A%2F%2Fwww.maps.com%2Fapp%2Fuploads%2F2025%2F02%2Farticle-japan-climate-temperature.webp&imgrefurl=https%3A%2F%2Fwww.maps.com%2Fjapan-summer-climate-maps-high-temperatures-and-rainfall%2F&docid=2UFDvu7lHGRpfM&tbnid=JqwbSniv0pyW1M&vet=12ahUKEwixhOS8zcaUAxVQBu8CHUg4Nu8QnPAOegQIGBAB..i&w=1920&h=1920&hcb=2&ved=2ahUKEwixhOS8zcaUAxVQBu8CHUg4Nu8QnPAOegQIGBAB',
    caption: 'Label climate zones or biomes visible on this map.'
  },
  {
    title: 'Population / Human Activity Map',
    imageUrl: 'https://www.google.com/imgres?q=population%20map%20of%20japan&imgurl=https%3A%2F%2Flookaside.fbsbx.com%2Flookaside%2Fcrawler%2Fmedia%2F%3Fmedia_id%3D10156456758936858&imgrefurl=https%3A%2F%2Fwww.facebook.com%2Fgroups%2F839957606051774%2Fposts%2F1877463165634541%2F&docid=mgIrpUY-uPNOaM&tbnid=b_PNsnsUKm3yOM&vet=12ahUKEwiVh-jPzcaUAxX1KEQIHfALKYcQnPAOegQIHxAB..i&w=2048&h=1957&hcb=2&ved=2ahUKEwiVh-jPzcaUAxX1KEQIHfALKYcQnPAOegQIHxAB',
    caption: 'Coastal cities are very heavily populated.'
  },
];

let images = JSON.parse(localStorage.getItem('geo-maps-images') || '{}');
let captions = JSON.parse(localStorage.getItem('geo-maps-captions') || '{}');
let titles = JSON.parse(localStorage.getItem('geo-maps-titles') || '{}');

  function render() {
  const grid = document.getElementById('maps-grid');
  grid.innerHTML = '';

  mapDefs.forEach((m, i) => {
    const imgSrc = m.imageUrl || '';
    const cap = captions[i] !== undefined ? captions[i] : m.caption;
    const title = titles[i] !== undefined ? titles[i] : m.title;

    grid.innerHTML += `
    <div class="map-slot">
      <div class="map-slot-header">
        <span>🗺️</span>
        <input type="text"
          value="${title}"
          placeholder="Map Title"
          onchange="titles[${i}] = this.value; save()">
      </div>

      <div class="map-area">

        ${
          imgSrc && imgSrc !== 'PASTE_IMAGE_URL_HERE'
          ? `<img src="${imgSrc}" alt="Map ${i+1}">`
          : `
          <div class="placeholder-text">
            <span class="icon">🌐</span>
            <p>
              Paste an image URL inside the code<br>
              <span style="color:#ccc;font-size:0.78rem">
                imageUrl: 'YOUR_LINK_HERE'
              </span>
            </p>
          </div>
          `
        }

      </div>

      <div class="map-caption">
        <textarea
          placeholder="Write your map caption and analysis here..."
          onchange="captions[${i}] = this.value; save()"
        >${cap}</textarea>
      </div>

    </div>`;
  });
}

function loadImg(event, i) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => { images[i] = e.target.result; save(); render(); };
  reader.readAsDataURL(file);
}

function clearImg(i) { delete images[i]; save(); render(); }

function save() {
  try {
    localStorage.setItem('geo-maps-images', JSON.stringify(images));
    localStorage.setItem('geo-maps-captions', JSON.stringify(captions));
    localStorage.setItem('geo-maps-titles', JSON.stringify(titles));
  } catch(e) { console.warn('Storage full — images may not persist'); }
}

render();
</script>
</body>
</html>

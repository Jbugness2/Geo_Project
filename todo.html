<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List — Geography Project</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1b2a4a;
    --navy-dark: #111e35;
    --red: #c0392b;
    --cream: #faf5ee;
    --cream-dark: #f0e9dc;
    --gold: #c9a84c;
    --ink: #2c2c2c;
    --muted: #6a6258;
    --rule: #ddd5c4;
    --accent: #c9a84c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream-dark); font-family:'Raleway',sans-serif; color:var(--ink); }

  nav {
    background: var(--navy-dark);
    padding: 12px 30px;
    border-bottom: 2px solid var(--gold);
    display:flex; align-items:center; justify-content:space-between;
  }
  nav a { color:var(--gold); text-decoration:none; font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; }
  nav a:hover { color:#fff; }

  .page-title {
    background: var(--navy);
    color: var(--cream);
    padding: 36px 40px;
    border-bottom: 4px solid var(--red);
    position: relative; overflow: hidden;
  }
  .page-title::before {
    content: '日本'; font-family:'Noto Serif JP',serif; font-size:120px; font-weight:700;
    position:absolute; right:20px; top:-10px; opacity:0.06; color:var(--gold);
  }
  .page-title small { font-size:0.72rem; opacity:0.75; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
  .page-title h1 { font-family:'Playfair Display',serif; font-size:2rem; margin-top:6px; }

  .container { max-width:760px; margin:36px auto; padding:0 20px 70px; }

  .edit-only { display:none; }

  .btn { display:inline-block; padding:9px 18px; border-radius:4px; font-family:'Raleway',sans-serif; font-size:0.85rem; font-weight:700; cursor:pointer; border:none; transition:all 0.2s; letter-spacing:0.04em; }
  .btn-primary { background:var(--navy); color:var(--gold); }
  .btn-primary:hover { background:var(--navy-dark); }
  .btn-secondary { background:transparent; color:var(--navy); border:2px solid var(--navy); }
  .btn-secondary:hover { background:rgba(27,42,74,0.08); }
  .btn-sm { padding:6px 14px; font-size:0.79rem; }

  .config { background:var(--cream); border-radius:6px; padding:18px 22px; margin-bottom:20px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; box-shadow:0 2px 10px rgba(27,42,74,0.08); border-left:4px solid var(--navy); }
  .config label { font-size:0.82rem; color:var(--muted); white-space:nowrap; }
  .config input[type=text] { border:1.5px solid var(--rule); border-radius:3px; padding:8px 12px; font-family:'Raleway',sans-serif; font-size:0.87rem; flex:1; min-width:180px; }
  .config input:focus { outline:none; border-color:var(--gold); }

  .print-bar { text-align:right; margin-bottom:16px; }

  .todo-card { background:var(--cream); border-radius:6px; box-shadow:0 4px 20px rgba(27,42,74,0.1); overflow:hidden; border-top:4px solid var(--navy); }
  .todo-header { background:var(--navy); color:var(--cream); padding:24px 28px; }
  .todo-header h2 { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--cream); }
  .todo-header h2 em { color:var(--gold); font-style:italic; }
  .todo-header p { font-size:0.82rem; margin-top:4px; opacity:0.7; }
  .todo-body { padding:22px 26px; }

  .progress-bar { background:var(--rule); border-radius:10px; height:8px; overflow:hidden; }
  .progress-fill { background:var(--red); height:100%; border-radius:10px; transition:width 0.3s; }
  .progress-label { font-size:0.77rem; color:var(--muted); margin-top:5px; margin-bottom:18px; }

  .category { margin-bottom:22px; }
  .cat-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .cat-name-display { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.16em; font-weight:700; color:var(--navy); flex:1; border-bottom:2px solid var(--gold); padding-bottom:3px; }
  .cat-name-input { flex:1; border:1.5px dashed var(--rule); border-radius:3px; padding:4px 8px; font-size:0.7rem; font-family:'Raleway',sans-serif; color:var(--navy); font-weight:700; text-transform:uppercase; }
  .cat-name-input:focus { outline:none; border-color:var(--gold); background:white; }
  .cat-remove-btn { background:none; border:none; color:var(--rule); cursor:pointer; font-size:0.82rem; display:none; }
  .cat-remove-btn:hover { color:var(--red); }
  body[data-edit-mode="on"] .cat-name-display { display:none; }
  body[data-edit-mode="on"] .cat-name-input   { display:block; }
  body[data-edit-mode="on"] .cat-remove-btn   { display:inline; }

  .todo-item { display:flex; align-items:flex-start; gap:10px; padding:9px 10px; border-radius:3px; margin-bottom:4px; transition:background 0.13s; }
  .todo-item:hover { background:var(--cream-dark); }
  .todo-item input[type=checkbox] { margin-top:3px; accent-color:var(--navy); width:16px; height:16px; flex-shrink:0; cursor:pointer; }
  .item-text { flex:1; font-size:0.89rem; border:none; background:transparent; font-family:'Raleway',sans-serif; color:var(--ink); line-height:1.4; resize:none; overflow:hidden; }
  .item-text:focus { outline:none; }
  .item-text.done { text-decoration:line-through; color:#bbb; }
  body:not([data-edit-mode="on"]) .item-text { pointer-events:none; cursor:default; }
  body[data-edit-mode="on"] .item-text { pointer-events:auto; cursor:text; }

  .tag-badge { font-size:0.68rem; padding:2px 8px; border-radius:10px; background:var(--navy); color:var(--gold); white-space:nowrap; flex-shrink:0; }
  .tag-input  { font-size:0.68rem; padding:2px 8px; border-radius:10px; background:transparent; color:var(--muted); font-family:'Raleway',sans-serif; width:80px; border:1.5px dashed var(--rule); display:none; }
  .tag-input:focus { outline:none; border-color:var(--gold); background:white; }
  body[data-edit-mode="on"] .tag-badge { display:none; }
  body[data-edit-mode="on"] .tag-input  { display:inline-block; }

  .del-btn { background:none; border:none; cursor:pointer; color:var(--rule); font-size:1rem; padding:0 2px; display:none; }
  .del-btn:hover { color:var(--red); }
  body[data-edit-mode="on"] .del-btn { display:inline; }

  .add-item-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .add-item-row input[type=text] { flex:1; border:1.5px dashed var(--rule); border-radius:3px; padding:7px 12px; font-size:0.84rem; font-family:'Raleway',sans-serif; }
  .add-item-row input:focus { outline:none; border-color:var(--gold); background:white; }
  .add-item-row button { background:var(--navy); color:var(--gold); border:none; border-radius:3px; padding:7px 14px; cursor:pointer; font-size:0.84rem; font-family:'Raleway',sans-serif; font-weight:600; }

  .add-cat-row { margin-top:18px; display:flex; gap:8px; }
  .add-cat-row input { flex:1; border:1.5px dashed var(--rule); border-radius:3px; padding:8px 12px; font-size:0.84rem; font-family:'Raleway',sans-serif; }
  .add-cat-row input:focus { outline:none; border-color:var(--gold); background:white; }

  @media print {
    nav, .config, .edit-only, .print-bar, .add-item-row, .add-cat-row,
    .del-btn, .cat-remove-btn, .tag-input { display:none !important; }
    body { background:white; }
    .todo-card { box-shadow:none; border:1px solid #ddd; }
    .tag-badge { display:inline-block !important; }
  }
</style>
</head>
<body>
<nav>
  <a href="index.html">← Back to Project Hub</a>
</nav>
<div class="page-title">
  <small>Genre 5</small>
  <h1>✅ To-Do List</h1>
</div>

<div class="container">

  <div class="edit-only">
    <div class="config">
      <label>Title:</label>
      <input type="text" id="list-title" placeholder="List title…" oninput="updateHeader()">
      <label>Subtitle:</label>
      <input type="text" id="list-sub" placeholder="Subtitle…" oninput="updateHeader()">
      <button class="btn btn-primary btn-sm" onclick="saveAll()">💾 Save</button>
    </div>
  </div>

  <div class="print-bar">
    <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨 Print</button>
  </div>

  <div class="todo-card">
    <div class="todo-header">
      <h2 id="header-title">Loading…</h2>
      <p id="header-sub"></p>
    </div>
    <div class="todo-body">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">0 of 0 tasks complete</div>
      <div id="categories-container"></div>
      <div class="edit-only add-cat-row">
        <input type="text" id="new-cat-name" placeholder="New category name…">
        <button class="btn btn-primary btn-sm" onclick="addCategory()">+ Category</button>
      </div>
    </div>
  </div>

</div>

<script src="auth.js"></script>
<script>
const defaultData = {
  title: "Field Researcher's Action List: [Your Region]",
  sub:   "Steps for understanding physical and human systems",
  cats: [
    { name:"💵 Low Class", items:[
        {text:"Wake up early for work or school responsibilities",          done:false, tag:"Morning"},
        {text:"Use public transportation or walk to daily destinations",    done:false, tag:"Travel"},
        {text:"Work long shifts or multiple jobs during the day",           done:false, tag:"Work"},
        {text:"Shop for affordable groceries and basic necessities",        done:false, tag:"Shopping"},
        {text:"Spend evenings with family or resting at home",              done:false, tag:"Home"},
      ]},
      { name:"🏠 Middle Class", items:[
        {text:"Prepare for work or school in the morning",                  done:false, tag:"Morning"},
        {text:"Commute by personal vehicle or public transportation",       done:false, tag:"Travel"},
        {text:"Work regular business hours or attend classes",              done:false, tag:"Work"},
        {text:"Participate in hobbies, sports, or social activities",       done:false, tag:"Lifestyle"},
        {text:"Spend time with family, entertainment, or dining out",       done:false, tag:"Evening"},
      ]},
      { name:"💎 High Class", items:[
        {text:"Begin the day with luxury routines or personal services",    done:false, tag:"Luxury"},
        {text:"Travel using private vehicles or premium transportation",    done:false, tag:"Travel"},
        {text:"Manage businesses, investments, or high-level meetings",     done:false, tag:"Work"},
        {text:"Attend exclusive events, restaurants, or vacations",         done:false, tag:"Lifestyle"},
        {text:"Spend free time on recreation, networking, or leisure",      done:false, tag:"Leisure"},
      ]},
      { name:"🧳 Tourist", items:[
        {text:"Visit famous landmarks and attractions",                     done:false, tag:"Sightseeing"},
        {text:"Take photos and explore local culture",                      done:false, tag:"Culture"},
        {text:"Try regional foods and restaurants",                         done:false, tag:"Food"},
        {text:"Shop for souvenirs and local products",                      done:false, tag:"Shopping"},
        {text:"Stay in hotels and plan the next destination",               done:false, tag:"Travel"},
      ]},
  ]
};

let data = JSON.parse(localStorage.getItem('geo-todo') || 'null');
if (!data) { data = defaultData; localStorage.setItem('geo-todo', JSON.stringify(data)); }

function updateHeader() {
  const t = document.getElementById('list-title')?.value || data.title;
  const s = document.getElementById('list-sub')?.value   || data.sub;
  document.getElementById('header-title').textContent = t;
  document.getElementById('header-sub').textContent   = s;
  data.title = t; data.sub = s;
}

function render() {
  const cont  = document.getElementById('categories-container');
  cont.innerHTML = '';
  let total = 0, doneCount = 0;
  data.cats.forEach((cat, ci) => {
    total     += cat.items.length;
    doneCount += cat.items.filter(i => i.done).length;
    const catDiv = document.createElement('div');
    catDiv.className = 'category';
    catDiv.innerHTML = `
      <div class="cat-header">
        <span class="cat-name-display">${esc(cat.name)}</span>
        <input class="cat-name-input" type="text" value="${esc(cat.name)}"
          oninput="data.cats[${ci}].name=this.value;
            this.closest('.cat-header').querySelector('.cat-name-display').textContent=this.value">
        <button class="cat-remove-btn" onclick="removeCat(${ci})">✕ remove</button>
      </div>
      <div id="items-${ci}">
        ${cat.items.map((item, ii) => `
          <div class="todo-item">
            <input type="checkbox" ${item.done?'checked':''} onchange="data.cats[${ci}].items[${ii}].done=this.checked;render()">
            <textarea class="item-text ${item.done?'done':''}" rows="1"
              oninput="data.cats[${ci}].items[${ii}].text=this.value;autoH(this)"
              >${esc(item.text)}</textarea>
            <span class="tag-badge">${esc(item.tag||'')}</span>
            <input class="tag-input" type="text" value="${esc(item.tag||'')}" placeholder="Tag"
              oninput="data.cats[${ci}].items[${ii}].tag=this.value;
                this.closest('.todo-item').querySelector('.tag-badge').textContent=this.value">
            <button class="del-btn" onclick="data.cats[${ci}].items.splice(${ii},1);render()">✕</button>
          </div>`).join('')}
      </div>
      <div class="edit-only add-item-row">
        <input type="text" id="new-item-${ci}" placeholder="Add a task…"
          onkeydown="if(event.key==='Enter')addItem(${ci})">
        <button onclick="addItem(${ci})">+ Add</button>
      </div>`;
    cont.appendChild(catDiv);
  });
  setTimeout(() => { document.querySelectorAll('.item-text').forEach(t => autoH(t)); }, 0);
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${doneCount} of ${total} tasks complete (${pct}%)`;
}

function autoH(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addItem(ci) {
  const inp = document.getElementById(`new-item-${ci}`);
  if (!inp || !inp.value.trim()) return;
  data.cats[ci].items.push({text: inp.value.trim(), done: false, tag: ''});
  inp.value = ''; render();
}
function addCategory() {
  const inp  = document.getElementById('new-cat-name');
  const name = inp?.value.trim() || 'New Category';
  data.cats.push({name, items: []});
  if (inp) inp.value = ''; render();
}
function removeCat(ci) {
  if (confirm('Remove this category and all its tasks?')) { data.cats.splice(ci, 1); render(); }
}
function saveAll() {
  localStorage.setItem('geo-todo', JSON.stringify(data));
  const toast = document.createElement('div');
  toast.textContent = '✅ Saved!';
  toast.style.cssText = `position:fixed;bottom:20px;right:20px;background:var(--navy);color:var(--gold);
    border:1px solid var(--gold);border-radius:4px;padding:10px 18px;font-family:'Raleway',sans-serif;
    font-size:0.84rem;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

document.addEventListener('DOMContentLoaded', () => {
  const titleInp = document.getElementById('list-title');
  const subInp   = document.getElementById('list-sub');
  if (titleInp) titleInp.value = data.title;
  if (subInp)   subInp.value   = data.sub;
  document.getElementById('header-title').textContent = data.title;
  document.getElementById('header-sub').textContent   = data.sub;
  render();
  function onAuthChange() {
    const on = document.body.dataset.editMode === 'on';
    document.querySelectorAll('.edit-only').forEach(el => el.style.display = on ? '' : 'none');
  }
  new MutationObserver(onAuthChange).observe(document.body, {attributes:true, attributeFilter:['data-edit-mode']});
  setTimeout(onAuthChange, 0);
});
</script>
</body>
</html>

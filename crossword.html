<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Crossword Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --parchment: #ede5d0;
    --bark: #5a3e2b;
    --bark-light: #8b6347;
    --ink: #2c1810;
    --moss: #4a5c3a;
    --sky: #c8dce8;
    --sky-deep: #a0bdd0;
    --blossom: #e8b4c0;
    --blossom-soft: #f2d5dc;
    --accent: #9b2335;
    --gold: #c4922a;
    --correct: #3d6b45;
    --wrong: #9b2335;
  }

  html, body {
    height: 100%;
    background: var(--sky);
  }

  body {
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── SKY & SCENE ── */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .sky-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      #b8cfe0 0%,
      #c8dce8 40%,
      #dce8d0 80%,
      #c8d8b0 100%
    );
  }

  /* SVG Trees */
  .trees-svg {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 340px;
  }

  /* Falling petals */
  .petal {
    position: absolute;
    width: 8px;
    height: 10px;
    border-radius: 60% 40% 60% 40%;
    background: var(--blossom);
    opacity: 0;
    animation: petal-fall linear infinite;
  }

  @keyframes petal-fall {
    0%   { transform: translateY(-20px) rotate(0deg) translateX(0px); opacity: 0; }
    8%   { opacity: 0.55; }
    85%  { opacity: 0.45; }
    100% { transform: translateY(105vh) rotate(540deg) translateX(80px); opacity: 0; }
  }

  /* ── MAIN LAYOUT ── */
  .main {
    position: relative;
    z-index: 2;
    max-width: 880px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .card {
    background: rgba(245, 240, 232, 0.94);
    border-radius: 12px;
    border: 1px solid rgba(90, 62, 43, 0.18);
    box-shadow: 0 8px 40px rgba(44, 24, 16, 0.15), 0 2px 8px rgba(44,24,16,0.08);
    overflow: hidden;
  }

  .card-header {
    background: var(--bark);
    padding: 20px 28px 16px;
    text-align: center;
    position: relative;
    border-bottom: 3px solid var(--gold);
  }

  .card-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.12em;
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .card-header p {
    font-family: 'Lora', serif;
    font-style: italic;
    color: var(--blossom-soft);
    font-size: 13px;
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  .card-body {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
  }

  /* ── CLUES PANEL ── */
  .clues-panel {
    padding: 20px 20px 20px 24px;
    border-right: 1px solid rgba(90, 62, 43, 0.15);
    min-width: 220px;
    max-width: 260px;
  }

  .clue-group { margin-bottom: 18px; }

  .clue-group h3 {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(155, 35, 53, 0.25);
    padding-bottom: 5px;
    margin-bottom: 8px;
  }

  .clue-item {
    font-size: 11.5px;
    color: var(--ink);
    line-height: 1.45;
    margin-bottom: 6px;
    display: flex;
    gap: 5px;
    cursor: pointer;
    border-radius: 4px;
    padding: 2px 4px;
    transition: background 0.15s;
  }

  .clue-item:hover { background: rgba(196, 146, 42, 0.12); }
  .clue-item.active { background: rgba(196, 146, 42, 0.22); font-weight: 600; }

  .clue-num {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--bark-light);
    min-width: 18px;
    font-size: 10.5px;
    padding-top: 1px;
  }

  /* ── GRID ── */
  .grid-panel {
    padding: 20px 24px 20px 20px;
    flex: 1;
  }

  .grid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #crossword-grid {
    display: grid;
    gap: 2px;
    background: transparent;
  }

  .cell-wrap {
    position: relative;
    width: 32px;
    height: 32px;
  }

  .cell-num {
    position: absolute;
    top: 1px;
    left: 2px;
    font-family: sans-serif;
    font-size: 7.5px;
    font-weight: 700;
    color: var(--bark-light);
    z-index: 2;
    line-height: 1;
    pointer-events: none;
  }

  .cell-input {
    width: 100%;
    height: 100%;
    border: 1px solid rgba(90, 62, 43, 0.35);
    border-radius: 3px;
    background: rgba(255,255,255,0.88);
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    caret-color: var(--accent);
    outline: none;
    text-transform: uppercase;
    padding: 0;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    cursor: text;
  }

  .cell-input:focus {
    background: rgba(255, 252, 240, 0.97);
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(196, 146, 42, 0.25);
    z-index: 3;
    position: relative;
  }

  .cell-input.highlighted {
    background: rgba(232, 220, 180, 0.55);
    border-color: rgba(196, 146, 42, 0.5);
  }

  .cell-input.correct {
    background: rgba(61, 107, 69, 0.12);
    border-color: var(--correct);
    color: var(--correct);
  }

  .cell-input.wrong {
    background: rgba(155, 35, 53, 0.1);
    border-color: var(--wrong);
    color: var(--wrong);
  }

  .cell-empty {
    width: 32px;
    height: 32px;
    border-radius: 3px;
    background: transparent;
  }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 9px 20px;
    border-radius: 6px;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-check {
    background: var(--bark);
    color: var(--cream);
    border-color: var(--bark);
  }
  .btn-check:hover { background: var(--bark-light); border-color: var(--bark-light); }

  .btn-reveal {
    background: transparent;
    color: var(--accent);
    border-color: var(--accent);
  }
  .btn-reveal:hover { background: rgba(155, 35, 53, 0.08); }

  .btn-clear {
    background: transparent;
    color: var(--moss);
    border-color: var(--moss);
  }
  .btn-clear:hover { background: rgba(74, 92, 58, 0.08); }

  .status-msg {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--bark-light);
    text-align: center;
    min-height: 20px;
    transition: color 0.3s;
  }

  .status-msg.success { color: var(--correct); font-weight: 600; }
  .status-msg.error   { color: var(--wrong); }

  @media (max-width: 620px) {
    .card-body { grid-template-columns: 1fr; }
    .clues-panel { max-width: 100%; border-right: none; border-bottom: 1px solid rgba(90,62,43,0.15); }
    .card-header h1 { font-size: 20px; }
  }
</style>
</head>

<script>
// ── PUZZLE DATA ──
const ROWS = 15, COLS = 15;

const placements = [
  { word: "JAPANESEALPS", r: 0,  c: 4,  dir: "D", clue: "Japan's central mountain range" },
  { word: "TOKYO",        r: 0,  c: 1,  dir: "D", clue: "Capital of Japan" },
  { word: "HOKKAIDO",     r: 1,  c: 0,  dir: "A", clue: "Japan's northernmost main island" },
  { word: "PACIFIC",      r: 3,  c: 3,  dir: "A", clue: "Ocean bordering Japan to the east" },
  { word: "SHIKOKU",      r: 5,  c: 0,  dir: "D", clue: "Smallest of Japan's four main islands" },
  { word: "HIROSHIMA",    r: 6,  c: 0,  dir: "A", clue: "City on western Honshu, site of 1945 atomic bombing" },
  { word: "MONSOON",      r: 6,  c: 7,  dir: "D", clue: "Seasonal wind bringing heavy summer rain to Japan" },
  { word: "INLAND",       r: 8,  c: 6,  dir: "A", clue: "The ___ Sea — sheltered body of water between Honshu, Shikoku and Kyushu" },
  { word: "FUJI",         r: 10, c: 11, dir: "D", clue: "Japan's highest volcano" },
  { word: "HONSHU",       r: 11, c: 6,  dir: "A", clue: "Japan's largest island" },
];

// ── BUILD ANSWER GRID ──
const answer = Array.from({length: ROWS}, () => Array(COLS).fill(null));
placements.forEach(p => {
  for (let i = 0; i < p.word.length; i++) {
    const r = p.dir === "A" ? p.r : p.r + i;
    const c = p.dir === "A" ? p.c + i : p.c;
    answer[r][c] = p.word[i];
  }
});

// ── NUMBERING ──
const numGrid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let counter = 1;
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    if (!answer[r][c]) continue;
    const sa = answer[r][c] && (c === 0 || !answer[r][c-1]) && c+1 < COLS && answer[r][c+1];
    const sd = answer[r][c] && (r === 0 || !answer[r-1][c]) && r+1 < ROWS && answer[r+1] && answer[r+1][c];
    if (sa || sd) numGrid[r][c] = counter++;
  }
}

// Assign numbers to placements
placements.forEach(p => { p.num = numGrid[p.r][p.c]; });

// ── RENDER GRID ──
const gridEl = document.getElementById('crossword-grid');
gridEl.style.gridTemplateColumns = `repeat(${COLS}, 32px)`;
gridEl.style.gridTemplateRows = `repeat(${ROWS}, 32px)`;
gridEl.style.gap = '2px';

const inputs = {}; // key = "r,c"

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    if (answer[r][c]) {
      const wrap = document.createElement('div');
      wrap.className = 'cell-wrap';
      wrap.style.cssText = `position:relative;width:32px;height:32px;`;

      if (numGrid[r][c]) {
        const numSpan = document.createElement('span');
        numSpan.className = 'cell-num';
        numSpan.textContent = numGrid[r][c];
        wrap.appendChild(numSpan);
      }

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.maxLength = 1;
      inp.className = 'cell-input';
      inp.dataset.r = r;
      inp.dataset.c = c;
      inp.setAttribute('autocomplete', 'off');
      inp.setAttribute('autocorrect', 'off');
      inp.setAttribute('spellcheck', 'false');

      inp.addEventListener('input', e => {
        let v = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
        e.target.value = v ? v[v.length - 1] : '';
        clearStatus();
        e.target.classList.remove('correct', 'wrong');
        if (v) advanceFocus(r, c);
      });

      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !e.target.value) retreatFocus(r, c);
        if (e.key === 'ArrowRight') { e.preventDefault(); moveFocus(r, c+1); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); moveFocus(r, c-1); }
        if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(r+1, c); }
        if (e.key === 'ArrowUp')    { e.preventDefault(); moveFocus(r-1, c); }
      });

      inp.addEventListener('focus', () => highlightWord(r, c));
      inp.addEventListener('click', () => highlightWord(r, c));

      wrap.appendChild(inp);
      inputs[`${r},${c}`] = inp;
      gridEl.appendChild(wrap);
    } else {
      const empty = document.createElement('div');
      empty.className = 'cell-empty';
      gridEl.appendChild(empty);
    }
  }
}

// ── FOCUS HELPERS ──
function moveFocus(r, c) {
  const inp = inputs[`${r},${c}`];
  if (inp) inp.focus();
}

function advanceFocus(r, c) {
  // Try right first, then down
  if (inputs[`${r},${c+1}`]) moveFocus(r, c+1);
  else if (inputs[`${r+1},${c}`]) moveFocus(r+1, c);
}

function retreatFocus(r, c) {
  if (inputs[`${r},${c-1}`]) moveFocus(r, c-1);
  else if (inputs[`${r-1},${c}`]) moveFocus(r-1, c);
}

// ── HIGHLIGHT WORD ──
let currentWordCells = [];

function highlightWord(r, c) {
  currentWordCells.forEach(k => {
    const inp = inputs[k];
    if (inp) inp.classList.remove('highlighted');
  });
  currentWordCells = [];

  // Find which word(s) this cell belongs to and highlight the best one
  const across = placements.find(p => p.dir === 'A' && p.r === r && c >= p.c && c < p.c + p.word.length);
  const down   = placements.find(p => p.dir === 'D' && p.c === c && r >= p.r && r < p.r + p.word.length);
  const target = across || down;
  if (!target) return;

  for (let i = 0; i < target.word.length; i++) {
    const tr = target.dir === 'A' ? target.r : target.r + i;
    const tc = target.dir === 'A' ? target.c + i : target.c;
    const key = `${tr},${tc}`;
    currentWordCells.push(key);
    const inp = inputs[key];
    if (inp) inp.classList.add('highlighted');
  }

  // Highlight clue
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  const clueEl = document.querySelector(`.clue-item[data-num="${target.num}"][data-dir="${target.dir}"]`);
  if (clueEl) clueEl.classList.add('active');
}

// ── CLUE LIST ──
function buildClues() {
  const across = placements.filter(p => p.dir === 'A').sort((a,b) => a.num - b.num);
  const down   = placements.filter(p => p.dir === 'D').sort((a,b) => a.num - b.num);

  function makeClue(p) {
    const div = document.createElement('div');
    div.className = 'clue-item';
    div.dataset.num = p.num;
    div.dataset.dir = p.dir;
    div.innerHTML = `<span class="clue-num">${p.num}</span><span>${p.clue}</span>`;
    div.addEventListener('click', () => {
      const inp = inputs[`${p.r},${p.c}`];
      if (inp) { inp.focus(); highlightWord(p.r, p.c); }
    });
    return div;
  }

  const acrossList = document.getElementById('across-list');
  const downList   = document.getElementById('down-list');
  across.forEach(p => acrossList.appendChild(makeClue(p)));
  down.forEach(p => downList.appendChild(makeClue(p)));
}
buildClues();

// ── CHECK / REVEAL / CLEAR ──
function clearStatus() {
  const s = document.getElementById('status');
  s.textContent = '';
  s.className = 'status-msg';
}

function checkAnswers() {
  let total = 0, correct = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!answer[r][c]) continue;
      const inp = inputs[`${r},${c}`];
      if (!inp) continue;
      const val = inp.value.toUpperCase();
      if (!val) continue;
      total++;
      inp.classList.remove('correct', 'wrong');
      if (val === answer[r][c]) { inp.classList.add('correct'); correct++; }
      else { inp.classList.add('wrong'); }
    }
  }

  const status = document.getElementById('status');
  if (total === 0) {
    status.textContent = 'Fill in some answers first!';
    status.className = 'status-msg';
    return;
  }

  // Check if fully solved
  const filled = Object.values(inputs).filter(i => i.value).length;
  const totalCells = Object.keys(inputs).length;
  if (correct === totalCells) {
    status.textContent = '✦ Congratulations! All answers correct! ✦';
    status.className = 'status-msg success';
  } else {
    status.textContent = `${correct} of ${totalCells} cells correct (${filled} filled)`;
    status.className = 'status-msg error';
  }
}

function revealAll() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!answer[r][c]) continue;
      const inp = inputs[`${r},${c}`];
      if (inp) {
        inp.value = answer[r][c];
        inp.classList.remove('wrong');
        inp.classList.add('correct');
      }
    }
  }
  const status = document.getElementById('status');
  status.textContent = 'Answers revealed!';
  status.className = 'status-msg';
}

function clearAll() {
  Object.values(inputs).forEach(inp => {
    inp.value = '';
    inp.classList.remove('correct', 'wrong', 'highlighted');
  });
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  clearStatus();
}

// ── FALLING PETALS ──

for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  const size = 7 + Math.random() * 9;
  const hue  = Math.random() > 0.5 ? '#e8b4c0' : '#f2d5dc';
  p.style.cssText = `
    width:${size}px; height:${size * 1.25}px;
    left:${Math.random() * 100}%;
    background:${hue};
    animation-duration:${6 + Math.random() * 8}s;
    animation-delay:${-Math.random() * 14}s;
    border-radius: ${50 + Math.random()*20}% ${40+Math.random()*20}% ${50+Math.random()*20}% ${40+Math.random()*20}%;
    transform: rotate(${Math.random()*360}deg);
  `;
  petalContainer.appendChild(p);
}
